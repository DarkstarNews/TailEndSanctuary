<!DOCTYPE html>
<html>
<head>
  <title>Tail End Sanctuary - Mockup Review</title>
  <style>
    body { margin: 0; padding: 20px; background: #f5f5f5; font-family: system-ui; }
    h1 { margin-bottom: 30px; }
    .mockup { margin-bottom: 60px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .mockup h2 { margin-top: 0; color: #333; }
    .mockup img { max-width: 100%; height: auto; border: 1px solid #ddd; cursor: pointer; }
    .mockup img:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>Tail End Sanctuary - Page Mockups from Juanita</h1>
  <p>Click images to open full size</p>
  
  <div class="mockup">
    <h2>Page 1 - Home?</h2>
    <img src="mockups/page-1.png" alt="Page 1" onclick="window.open(this.src)">
  </div>

    <h2>Page 2 - About Us ✅ DONE</h2>
    <img src="mockups/page-2.png" alt="Page 2" onclick="window.open(this.src)">
  </div>
  
  <div class="mockup">
    <h2>Page 3 - Meet the Dogs?</h2>
    <img src="mockups/page-3.png" alt="Page 3" onclick="window.open(this.src)">
  </div>
  
  <div class="mockup">
    <h2>Page 4 - Get Involved?</h2>
    <img src="mockups/page-4.png" alt="Page 4" onclick="window.open(this.src)">
  </div>
  
  <div class="mockup">

    <img src="mockups/page-7.png" alt="Page 7" onclick="window.open(this.src)">
  </div>
</body>
</html>
